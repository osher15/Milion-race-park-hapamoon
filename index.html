<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>המרוץ למיליון · פארק הפעמון</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Suez+One&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --night:#070b24;
  --night2:#120a35;
  --gold:#f5c518;
  --gold-soft:#ffe082;
  --magenta:#ff3d8b;
  --teal:#28e0c8;
  --ink:#fff;
  --muted:#a9b0d6;
  --good:#2ee06a;
  --bad:#ff4d5e;
  --card:rgba(255,255,255,.06);
  --line:rgba(245,197,24,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:'Rubik',sans-serif;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(245,197,24,.20), transparent 55%),
    radial-gradient(90% 70% at 80% 110%, rgba(255,61,139,.18), transparent 50%),
    linear-gradient(160deg, var(--night), var(--night2) 70%, #050617);
  color:var(--ink);
  min-height:100%;
  overflow-x:hidden;
}
/* spotlight rays */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    conic-gradient(from 200deg at 50% -5%, transparent 0deg, rgba(245,197,24,.06) 18deg, transparent 36deg, rgba(255,255,255,.05) 54deg, transparent 72deg, rgba(245,197,24,.06) 90deg, transparent 108deg);
  mix-blend-mode:screen;
}
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:18px 16px 40px;min-height:100vh;display:flex;flex-direction:column}
.brand{text-align:center;margin:6px 0 14px}
.brand .crown{font-size:30px;filter:drop-shadow(0 4px 10px rgba(245,197,24,.5))}
.brand h1{
  font-family:'Suez One',serif;font-weight:400;margin:2px 0;line-height:1;
  font-size:clamp(30px,9vw,46px);
  background:linear-gradient(180deg,#fff,var(--gold) 55%,#c79100);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 0 rgba(0,0,0,.2);
}
.brand .sub{color:var(--gold-soft);letter-spacing:3px;font-size:12px;font-weight:700;opacity:.9}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
  border:1px solid var(--line);
  border-radius:22px;padding:22px 18px;margin-bottom:14px;
  box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
}
.center{text-align:center}
h2{font-family:'Suez One',serif;font-weight:400;margin:0 0 8px;font-size:24px;color:#fff}
p.lead{color:var(--muted);margin:6px 0 16px;line-height:1.6;font-size:15px}

label{display:block;font-weight:700;font-size:14px;margin:14px 0 6px;color:var(--gold-soft)}
input[type=text], textarea, .ipt{
  width:100%;background:rgba(0,0,0,.32);border:1.5px solid rgba(255,255,255,.14);
  border-radius:14px;color:#fff;font-family:'Rubik';font-size:16px;padding:13px 14px;outline:none;
}
input[type=text]:focus, textarea:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:64px;line-height:1.5}

.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:none;border-radius:16px;padding:16px;font-family:'Rubik';font-weight:900;font-size:18px;
  cursor:pointer;transition:transform .08s ease, filter .15s ease;margin-top:8px;color:#1a1200;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold) 45%,#d8a200);
  box-shadow:0 10px 26px rgba(245,197,24,.35), inset 0 1px 0 rgba(255,255,255,.6);
}
.btn:active{transform:translateY(2px) scale(.99)}
.btn.alt{background:linear-gradient(180deg,#3a2f7a,#241a55);color:#fff;box-shadow:0 10px 24px rgba(0,0,0,.4)}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--gold-soft);box-shadow:none;font-size:15px;padding:12px}
.btn.small{font-size:14px;padding:11px;border-radius:12px}

.bank{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(90deg, rgba(245,197,24,.16), rgba(255,61,139,.12));
  border:1px solid var(--line);border-radius:16px;padding:12px 16px;margin-bottom:14px;
}
.bank .lbl{font-size:12px;color:var(--gold-soft);font-weight:700;letter-spacing:1px}
.bank .amt{font-family:'Suez One',serif;font-size:26px;color:#fff;line-height:1}
.bank .team{font-size:13px;color:var(--muted);font-weight:700}

.steps{display:flex;gap:6px;justify-content:center;margin:2px 0 16px;flex-wrap:wrap}
.dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.2);transition:.3s}
.dot.done{background:var(--good);border-color:var(--good);box-shadow:0 0 10px rgba(46,224,106,.6)}
.dot.now{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(245,197,24,.8);transform:scale(1.25)}

.tag{display:inline-block;background:rgba(245,197,24,.15);color:var(--gold-soft);border:1px solid var(--line);
  padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px}

.riddle{font-size:19px;line-height:1.7;font-weight:500;background:rgba(0,0,0,.22);border-right:4px solid var(--gold);
  padding:16px 16px;border-radius:12px;margin:6px 0 4px}

#reader{width:100%;border-radius:16px;overflow:hidden;border:2px solid var(--line);background:#000;min-height:240px}
.scanhint{text-align:center;color:var(--muted);font-size:13px;margin:10px 0}

.opt{
  width:100%;text-align:right;background:rgba(0,0,0,.28);border:1.5px solid rgba(255,255,255,.14);
  border-radius:14px;padding:15px 16px;margin:8px 0;color:#fff;font-family:'Rubik';font-size:16px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:12px;transition:.12s;
}
.opt .ltr{flex:0 0 30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;
  background:rgba(245,197,24,.2);color:var(--gold-soft);font-weight:900;font-size:14px}
.opt:active{transform:scale(.99)}
.opt.correct{background:rgba(46,224,106,.2);border-color:var(--good)}
.opt.wrong{background:rgba(255,77,94,.2);border-color:var(--bad)}
.opt[disabled]{opacity:.6}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:50;
  background:#1a1245;border:1.5px solid var(--line);color:#fff;padding:13px 20px;border-radius:14px;
  font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.5);opacity:0;transition:.3s;pointer-events:none;max-width:90%}
.toast.show{opacity:1;bottom:30px}
.toast.bad{border-color:var(--bad)}

.win h2{font-size:30px}
.million{font-family:'Suez One',serif;font-size:clamp(40px,14vw,72px);line-height:1;margin:6px 0;
  background:linear-gradient(180deg,#fff,var(--gold) 60%,#c79100);-webkit-background-clip:text;background-clip:text;color:transparent}

.row{display:flex;gap:10px}
.row .btn{margin-top:8px}
.hr{height:1px;background:var(--line);opacity:.5;margin:18px 0}
.muted{color:var(--muted);font-size:13px;line-height:1.6}

/* admin */
.admin-mission{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;margin-bottom:12px}
.admin-mission h4{margin:0 0 4px;color:var(--gold-soft);font-size:15px;display:flex;justify-content:space-between;align-items:center}
.mini{font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:700}
.qrbox{background:#fff;border-radius:10px;padding:8px;width:fit-content;margin:8px auto 0}
.locphoto{position:relative;max-width:300px;margin:6px auto 4px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.locphoto img{display:block;width:100%}
.locbadge{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;background:var(--gold);color:#1a1200;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.seg{display:flex;background:rgba(0,0,0,.3);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:'Rubik';font-weight:700;padding:10px;border-radius:9px;cursor:pointer;font-size:14px}
.seg button.on{background:var(--gold);color:#1a1200}
.typepick{display:flex;gap:8px;margin:6px 0}
.typepick button{flex:1;border:1.5px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:var(--muted);border-radius:10px;padding:8px;font-family:'Rubik';font-weight:700;cursor:pointer;font-size:13px}
.typepick button.on{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.12)}

.footer{margin-top:auto;text-align:center;padding-top:18px}
.linkbtn{background:none;border:none;color:var(--muted);font-family:'Rubik';font-size:13px;text-decoration:underline;cursor:pointer}

/* confetti */
.confetti{position:fixed;top:-12px;width:10px;height:14px;z-index:40;opacity:.9;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* timer */
.clock-wrap{text-align:center}
.clk{font-family:'Suez One',serif;font-size:22px;color:var(--teal);line-height:1.1}
.bcells{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.bcell{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.08);color:var(--muted);border:1px solid rgba(255,255,255,.12)}
.bcell.on{background:var(--good);color:#042c12;border-color:var(--good)}
.bdet{margin-top:10px;border-top:1px solid var(--line);padding-top:6px}
.brow{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
.brow span:last-child{color:var(--gold-soft);font-weight:700;white-space:nowrap;padding-inline-start:10px}
.myteam{border-color:var(--gold)!important;box-shadow:0 0 0 2px rgba(245,197,24,.35),0 18px 50px rgba(0,0,0,.45)!important}
.countdown{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%, rgba(245,197,24,.20), rgba(3,5,20,.97))}
.cdnum{font-family:'Suez One',serif;font-size:130px;color:var(--gold);text-shadow:0 6px 34px rgba(245,197,24,.6);animation:cdpop .92s ease}
.cdnum.go{font-size:68px;color:#fff}
@keyframes cdpop{0%{transform:scale(.3);opacity:0}40%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}

/* map modal */
.mapmodal{position:fixed;inset:0;z-index:60;background:rgba(3,5,20,.86);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:14px}
.mapmodal.show{display:flex}
.mapinner{background:#0d1233;border:1px solid var(--line);border-radius:18px;max-width:560px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.maphead{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;color:var(--gold-soft);font-size:17px;font-weight:700}
.mapx{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer}
.mapwrap{position:relative;margin:0 12px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.mapimg{display:block;width:100%}
.pinlayer{position:absolute;inset:0}
.mappin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#1a1200;background:rgba(255,255,255,.55);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.mappin.now{background:var(--gold);border-color:#fff;box-shadow:0 0 0 4px rgba(245,197,24,.4),0 2px 10px rgba(0,0,0,.5);animation:pulsePin 1.3s infinite;z-index:3}
.mappin.done{background:var(--good);color:#042c12;border-color:#bff5d0;z-index:2}
@keyframes pulsePin{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.18)}}
.maplegend{padding:12px 16px 16px;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:2px;flex-wrap:wrap}
.lg{display:inline-block;width:13px;height:13px;border-radius:50%;margin-inline:5px;vertical-align:middle}
.lg.now{background:var(--gold)} .lg.done{background:var(--good)} .lg.next{background:rgba(255,255,255,.55)}
.admin-map-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--line);margin-top:8px;touch-action:none;user-select:none}
.admin-map-wrap img{display:block;width:100%;pointer-events:none}
.dragpin{position:absolute;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#1a1200;background:var(--gold);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);cursor:grab;touch-action:none}
.dragpin:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.15)}

/* print */
@media print{
  body{background:#fff;color:#000}
  body::before{display:none}
  .app{max-width:100%}
  .noprint{display:none!important}
  .printsheet{display:block!important}
  .qr-print{page-break-inside:avoid;text-align:center;border:2px dashed #999;border-radius:14px;padding:18px;margin:0 0 18px}
  .qr-print h3{font-family:'Suez One',serif;margin:0 0 4px;font-size:22px;color:#000}
  .qr-print .pnum{width:46px;height:46px;border-radius:50%;background:#111;color:#fff;font-weight:900;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-family:'Suez One',serif}
  .qr-print .prow{display:flex;align-items:center;justify-content:center;gap:20px;margin:8px 0;flex-wrap:wrap}
  .qr-print .pphoto{text-align:center}
  .qr-print .pphoto img{width:240px;border-radius:10px;border:1px solid #ccc}
  .qr-print .plabel{font-weight:700;color:#000;margin-top:4px;font-size:15px}
  .qr-print .pcode{font-size:14px;color:#444;margin:4px 0}
  .qr-print .priddle{font-size:14px;color:#222;margin-top:6px;max-width:420px;margin-inline:auto}
  .qr-print canvas,.qr-print img{margin:8px auto}
}
.printsheet{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="brand noprint">
    <div class="crown">👑</div>
    <h1>המרוץ למיליון</h1>
    <div class="sub">פארק הפעמון · נווה נוי · באר שבע</div>
  </div>

  <div id="view"></div>

  <div class="footer noprint">
    <button class="linkbtn" id="adminLink">⚙️ אזור מורה</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<!-- print target -->
<div id="printArea" class="printsheet"></div>

function saveCfg(){ try{localStorage.setItem(LS_CFG, JSON.stringify(MISSIONS));}catch(e){} }
function loadCfg(){ try{const v=localStorage.getItem(LS_CFG);return v?JSON.parse(v):null;}catch(e){return null;} }
function saveProg(){ try{localStorage.setItem(LS_PROG, JSON.stringify(S));}catch(e){} }
function loadProg(){ try{const v=localStorage.getItem(LS_PROG);return v?JSON.parse(v):null;}catch(e){return null;} }

const LS_RACE="bellpark_race_v1";
let RACE = loadRace() || { on:true, graceSec:120, decayPerMin:15, floorPct:40 };
function saveRace(){ try{localStorage.setItem(LS_RACE, JSON.stringify(RACE));}catch(e){} }
function loadRace(){ try{const v=localStorage.getItem(LS_RACE);return v?JSON.parse(v):null;}catch(e){return null;} }
function computeAward(prize, segSec){
  if(!RACE.on) return prize;
  const extraMin=Math.max(0,(segSec-(RACE.graceSec||0))/60);
  let f=1-extraMin*((RACE.decayPerMin||0)/100);
  f=Math.max((RACE.floorPct||0)/100, Math.min(1,f));
  return Math.round(prize*f/1000)*1000;
}
function fmtTime(ms){ if(!ms||ms<0)ms=0; const s=Math.floor(ms/1000); const m=Math.floor(s/60); return (m<10?'0':'')+m+':'+((s%60)<10?'0':'')+(s%60); }
function elapsedMs(){ return S.startTime? (Date.now()-S.startTime):0; }
function updateClock(){ const el=document.getElementById('clock'); if(el && S.startTime){ el.textContent=fmtTime(elapsedMs()); } }
function countdownThen(cb){
  let n=3;
  const ov=document.createElement('div'); ov.className='countdown';
  ov.innerHTML=`<div class="cdnum">${n}</div>`; document.body.appendChild(ov);
  const tick=()=>{
    n--;
    if(n>0){ ov.innerHTML=`<div class="cdnum">${n}</div>`; }
    else if(n===0){ ov.innerHTML=`<div class="cdnum go">צאו! 🏃</div>`; }
    else { ov.remove(); cb(); return; }
    setTimeout(tick,1000);
  };
  setTimeout(tick,1000);
}
function getSheetUrl(){
  try{ const p=new URLSearchParams(location.search).get('sheet'); if(p){ localStorage.setItem('bellpark_sheet',p); return p; } }catch(e){}
  try{ return localStorage.getItem('bellpark_sheet')||''; }catch(e){ return ''; }
}
function setSheetUrl(u){ try{ localStorage.setItem('bellpark_sheet',u);}catch(e){} }
function postResult(obj){
  const url=getSheetUrl(); if(!url) return;
  try{ fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(obj)}).catch(()=>{}); }catch(e){}
}
function fetchBoard(){
  const url=getSheetUrl(); if(!url)return;
  const cb='bpcb_'+Date.now();
  const s=document.createElement('script');
  function cleanup(){ try{delete window[cb];}catch(_){window[cb]=undefined;} if(s&&s.parentNode)s.remove(); }
  window[cb]=(j)=>{ boardData=(j&&j.rows)||[]; boardErr=''; drawBoard(); cleanup(); };
  s.onerror=()=>{ boardErr='שגיאת טעינה — ודאו שה-Web App פרוס לגישת "כל אחד".'; drawBoard(); cleanup(); };
  const sep=url.includes('?')?'&':'?';
  s.src=url+sep+'callback='+cb+'&t='+Date.now();
  document.body.appendChild(s);
}

const view=document.getElementById('view');
const fmt=n=>"₪"+n.toLocaleString('he-IL');
const totalPrize=()=>MISSIONS.reduce((a,m)=>a+(+m.prize||0),0);

/* ============ Toast ============ */
let toastT;
function toast(msg,bad=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(bad?' bad':'');
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',2200);
}

/* ============ Render ============ */
function dots(){
  let h='<div class="steps">';
  MISSIONS.forEach((m,i)=>{
    let c='dot'; if(i<S.idx)c+=' done'; else if(i===S.idx)c+=' now';
    h+=`<span class="${c}"></span>`;
  });
  return h+'</div>';
}
function bank(){
  const clk = (RACE.on && S.startTime)? `<div class="clock-wrap"><div class="lbl">⏱️ זמן</div><div class="clk" id="clock">${fmtTime(elapsedMs())}</div></div>`:'';
  return `<div class="bank">
    <div><div class="lbl">הקופה שלכם</div><div class="amt">${fmt(S.money)}</div></div>
    ${clk}
    <div class="team">${S.team?('קבוצת '+S.team):''}<br>תחנה ${Math.min(S.idx+1,MISSIONS.length)}/${MISSIONS.length}</div>
  </div>`;
}

function render(){
  stopScan();
  if(boardTimer){clearInterval(boardTimer);boardTimer=null;}
  if(S.screen==="home") return renderHome();
  if(S.screen==="clue") return renderClue();
  if(S.screen==="scan") return renderScan();
  if(S.screen==="task") return renderTask();
  if(S.screen==="done") return renderDone();
  if(S.screen==="board") return renderBoard();
  if(S.screen==="admin") return renderAdmin();
}

function renderHome(){
  view.innerHTML=`
  <div class="card center">
    <span class="tag">🎯 ציד אוצר עם קודי QR</span>
    <h2>מוכנים למרוץ?</h2>
    <p class="lead">עברו בין התחנות בפארק לפי הרמזים, סרקו את קוד ה-QR בכל נקודה, בצעו את המשימה — ואספו כסף עד <b style="color:var(--gold)">${fmt(totalPrize())}</b>!</p>
    <label for="team">שם הקבוצה</label>
    <input type="text" id="team" placeholder="לדוגמה: הנמרים" value="${S.team||''}" maxlength="20">
    ${RACE.on?'<p class="muted" style="margin-top:10px">⏱️ <b>מצב תחרות:</b> המתינו לאות מהמורה, ואז לחצו "מתחילים" יחד עם כל הקבוצות. ככל שתהיו מהירים — תרוויחו יותר כסף בכל תחנה!</p>':''}
    <button class="btn" id="startBtn">🚀 מתחילים!</button>
    ${(S.idx>0||S.started||S.team)?'<button class="btn ghost" id="resetBtn">🔁 איפוס משחק</button>':''}
  </div>
  <div class="card">
    <p class="muted">📍 <b>איך משחקים?</b><br>
    1. קוראים את הרמז ומגיעים לתחנה בפארק.<br>
    2. מוצאים את מדבקת ה-QR ולוחצים "סרוק".<br>
    3. עונים נכון על השאלה או מבצעים את המשימה.<br>
    4. מקבלים כסף + רמז לתחנה הבאה. בהצלחה! 🍀</p>
  </div>`;

    const name=document.getElementById('team').value.trim();

      S.started=true; S.screen="clue"; saveProg(); render();
    }
  };
  const rb=document.getElementById('resetBtn'); if(rb)rb.onclick=resetGame;

function startScan(){
  if(typeof Html5Qrcode==="undefined"){
    toast("טוען סורק... אם לא עובד, השתמשו בהזנה ידנית",true);return;
  }
  try{
    scanner=new Html5Qrcode("reader");
    scanning=true;
    scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}},
      (decoded)=>handleScan(decoded.trim()),
      ()=>{}
    ).catch(()=>{
      toast("אין גישה למצלמה — נסו הזנה ידנית",true);
    });
  }catch(e){ toast("בעיה במצלמה — נסו הזנה ידנית",true); }
}
function stopScan(){
  if(scanner&&scanning){ try{scanner.stop().then(()=>{scanner.clear&&scanner.clear();}).catch(()=>{});}catch(e){} }
  scanning=false; scanner=null;
}
function handleScan(code){
  if(!scanning)return;
  const m=MISSIONS[S.idx];
  if(code.toUpperCase()===m.code.toUpperCase()){
    scanning=false; stopScan();
    toast("✅ תחנה נכונה!");
    S.screen="task"; saveProg(); render();
  } else {
    toast("❌ זה לא קוד התחנה הנכונה",true);
  }
}
function manualEntry(){
  const m=MISSIONS[S.idx];
  const code=prompt("הקלידו את הקוד שמופיע מתחת ל-QR:");
  if(code===null)return;
  if(code.trim().toUpperCase()===m.code.toUpperCase()){
    stopScan(); toast("✅ תחנה נכונה!"); S.screen="task"; saveProg(); render();
  } else { toast("❌ קוד שגוי",true); }
}

function openMap(){
  let m=document.getElementById('mapModal');
  if(!m){ m=document.createElement('div'); m.id='mapModal'; m.className='mapmodal'; document.body.appendChild(m); }
  const pins=MISSIONS.map((mi,i)=>{
    let cls='mappin'; if(i<S.idx)cls+=' done'; else if(i===S.idx)cls+=' now';
    const label=(i<S.idx)?'✓':(i+1);
    return `<div class="${cls}" style="left:${mi.mapX}%;top:${mi.mapY}%">${label}</div>`;
  }).join('');
  m.innerHTML=`<div class="mapinner">
    <div class="maphead"><span>🗺️ מפת פארק הפעמון</span><button id="mapClose" class="mapx">✕</button></div>
    <div class="mapwrap"><img src="${MAP_IMG}" class="mapimg" alt="מפת הפארק"><div class="pinlayer">${pins}</div></div>
    <div class="maplegend"><span class="lg now"></span>התחנה שאתם בה<span class="lg done"></span>כבר השלמתם<span class="lg next"></span>בהמשך</div>
  </div>`;
  m.classList.add('show');
  document.getElementById('mapClose').onclick=closeMap;
  m.onclick=(e)=>{ if(e.target===m) closeMap(); };
}
function closeMap(){ const m=document.getElementById('mapModal'); if(m)m.classList.remove('show'); }

function drawBoard(){
  const st=document.getElementById('bStatus'); const body=document.getElementById('bBody');
  if(!body)return;
  if(boardErr){ if(st)st.innerHTML='<span style="color:var(--bad)">'+boardErr+'</span>'; return; }
  const data=(boardData||[]).slice(1); // drop header row
  const teams={};
  data.forEach(r=>{
    const t=r[1]; if(!t)return;
    if(!teams[t])teams[t]={team:t,total:0,elapsed:0,stations:{}};
    const stn=+r[2]||0, award=+r[4]||0, total=+r[5]||0, el=+r[6]||0;
    teams[t].stations[stn]={award:award,elapsed:el};
    teams[t].total=Math.max(teams[t].total,total);
    teams[t].elapsed=Math.max(teams[t].elapsed,el);
  });
  let arr=Object.values(teams).map(o=>{o.count=Object.keys(o.stations).length;return o;});
  arr.sort((a,b)=> b.total-a.total || a.elapsed-b.elapsed);
  if(st)st.innerHTML='✅ מעודכן · '+arr.length+' קבוצות (מתרענן כל 6 שניות)';
  if(!arr.length){ body.innerHTML='<div class="card center muted">עדיין אין תוצאות. כשקבוצות יסיימו תחנות הן יופיעו כאן.</div>'; return; }
  const medal=['🥇','🥈','🥉'];
  body.innerHTML=arr.map((o,i)=>{
    const cells=MISSIONS.map((m,si)=>`<span class="bcell ${o.stations[si+1]?'on':''}">${si+1}</span>`).join('');
    const det=MISSIONS.map((m,si)=>{ const s=o.stations[si+1]; return s?`<div class="brow"><span>${si+1}. ${m.name}</span><span>${fmt(s.award)} · ${fmtTime(s.elapsed*1000)}</span></div>`:''; }).join('');
    return `<div class="card${o.team===S.team?' myteam':''}" style="padding:14px">
       <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" data-exp="${i}">
         <div><b style="font-size:18px">${medal[i]||((i+1)+'.')} ${o.team}${o.team===S.team?' <span style="color:var(--teal);font-size:13px">(אתם)</span>':''}</b><div class="muted">${o.count}/${MISSIONS.length} תחנות · ⏱️ ${fmtTime(o.elapsed*1000)}</div></div>
         <div class="amt" style="font-size:22px">${fmt(o.total)}</div>
       </div>
       <div class="bcells">${cells}</div>
       <div class="bdet" id="det-${i}" style="display:none">${det||'<div class="muted">אין עדיין פירוט</div>'}</div>
     </div>`;
  }).join('');
  body.querySelectorAll('[data-exp]').forEach(el=>el.onclick=()=>{ const d=document.getElementById('det-'+el.dataset.exp); if(d)d.style.display=d.style.display==='none'?'block':'none'; });
}

function renderTask(){
  const m=MISSIONS[S.idx];
  if(m.type==="action"){
    view.innerHTML=`
    ${bank()}${dots()}
    <div class="card">
      <span class="tag">משימה · ${m.name}</span>
      <h2>משימת ספורט 💪</h2>
      <div class="riddle">${m.question}</div>
      <button class="btn" id="doneBtn">✅ ביצענו!</button>
    </div>`;
    document.getElementById('doneBtn').onclick=()=>{
      const seg=(Date.now()-(S.lastStamp||S.startTime||Date.now()))/1000;
      advance(computeAward(m.prize, seg));
    };
    return;
  }
  // quiz
  let opts=m.options.map((o,i)=>{
    const L=["א","ב","ג","ד"][i]||(i+1);
    return `<button class="opt" data-i="${i}"><span class="ltr">${L}</span><span>${o}</span></button>`;
  }).join("");
  view.innerHTML=`
  ${bank()}${dots()}
  <div class="card">
    <span class="tag">שאלה · ${m.name} · ${fmt(m.prize)}</span>
    <h2>${m.question}</h2>
    <div id="opts">${opts}</div>
  </div>`;
  let answered=false;
  view.querySelectorAll('.opt').forEach(b=>{
    b.onclick=()=>{
      if(answered)return; answered=true;
      const i=+b.dataset.i;
      view.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      if(i===m.correct){
        b.classList.add('correct');
        const seg=(Date.now()-(S.lastStamp||S.startTime||Date.now()))/1000;
        const award=computeAward(m.prize, seg);
        toast(RACE.on?`🎉 נכון! +${fmt(award)} · זמן ${fmtTime(seg*1000)}`:`🎉 תשובה נכונה! +${fmt(award)}`);
        setTimeout(()=>advance(award),1100);
      } else {
        b.classList.add('wrong');
        const cb=view.querySelector(`.opt[data-i="${m.correct}"]`); if(cb)cb.classList.add('correct');
        toast("לא מדויק — ממשיכים הלאה (בלי כסף על התחנה הזו)",true);
        setTimeout(()=>advance(0),1600);
      }
    };
  });
}

function advance(prize){
  S.money+=(+prize||0);
  const st=MISSIONS[S.idx];
  postResult({team:S.team, station:S.idx+1, stationName:st?st.name:('תחנה '+(S.idx+1)), award:(+prize||0), total:S.money, elapsed:Math.round(elapsedMs()/1000), done:(S.idx+1>=MISSIONS.length)});
  S.lastStamp=Date.now();
  S.idx++;
  if(S.idx>=MISSIONS.length){ S.finishTime=Date.now(); S.screen="done"; saveProg(); render(); }
  else { S.screen="clue"; saveProg(); render(); }
}

function renderDone(){
  const tot=(S.startTime&&S.finishTime)? fmtTime(S.finishTime-S.startTime):'—';
  view.innerHTML=`
  <div class="card center win">
    <div class="crown" style="font-size:46px">🏆</div>
    <h2>סיימתם את המרוץ!</h2>
    <p class="lead">קבוצת <b style="color:var(--gold)">${S.team}</b> סיימה את כל ${MISSIONS.length} התחנות בפארק הפעמון!</p>
    <div class="muted">הקופה הסופית שלכם:</div>
    <div class="million">${fmt(S.money)}</div>
    ${RACE.on?`<div class="bank" style="justify-content:center;gap:26px;margin-top:6px"><div class="clock-wrap"><div class="lbl">⏱️ זמן כולל</div><div class="clk">${tot}</div></div></div>
      <p class="muted" style="margin-top:8px">📣 דווחו למורה: <b style="color:var(--gold)">${fmt(S.money)}</b> בזמן <b>${tot}</b>. הקבוצה עם הכי הרבה כסף מנצחת!</p>`:''}
    <button class="btn" id="againBtn">🔁 משחק חדש</button>
  </div>`;
  document.getElementById('againBtn').onclick=resetGame;

}

function resetGame(){
  S={ team:"", idx:0, money:0, started:false, screen:"home" };
  saveProg(); render();
}

/* ============ Confetti ============ */
function confetti(){
  const cols=['#f5c518','#ff3d8b','#28e0c8','#fff','#7c5cff'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[Math.floor(Math.random()*cols.length)];
    c.style.animationDuration=(2.2+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.6)+'s';
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5200);
  }
}

      <div class="typepick" data-mi="${i}">

        <button class="${m.type==='action'?'on':''}" data-type="action" data-mi="${i}">💪 משימת ספורט</button>
      </div>
      <div class="mini">רמז (מוביל אל התחנה הזו)</div>

    </div>`;
  });

      <div class="card center"><div class="muted">סך הפרסים: <b style="color:var(--gold)">${fmt(totalPrize())}</b></div></div>`;
  body.innerHTML=h;

  body.querySelectorAll('.f-name').forEach(el=>el.oninput=e=>{MISSIONS[+e.target.dataset.mi].name=e.target.value;saveCfg();});
  body.querySelectorAll('.f-code').forEach(el=>el.oninput=e=>{MISSIONS[+e.target.dataset.mi].code=e.target.value;saveCfg();});
  body.querySelectorAll('.f-riddle').forEach(el=>el.oninput=e=>{MISSIONS[+e.target.dataset.mi].riddle=e.target.value;saveCfg();});

function makeQR(id,text,size){
  const el=document.getElementById(id); if(!el)return; el.innerHTML="";
  if(typeof QRCode==="undefined"){el.innerHTML='<div style="color:#a00;font-size:12px;padding:20px">לא ניתן לטעון מחולל QR (צריך אינטרנט)</div>';return;}
  try{ new QRCode(el,{text:text,width:size,height:size,correctLevel:QRCode.CorrectLevel.M}); }catch(e){}
}
function printQRs(){
  const area=document.getElementById('printArea');
  area.innerHTML=`<div class="center" style="margin-bottom:18px"><h2 style="color:#000">המרוץ למיליון · פארק הפעמון — קודי QR</h2></div>`;
  MISSIONS.forEach((m,i)=>{
    const d=document.createElement('div'); d.className='qr-print';
    d.innerHTML=`<div class="pnum">${i+1}</div><h3>${m.name}</h3><div class="pcode">קוד לסריקה: ${m.code}</div>
      <div class="prow">
        <div id="pqr-${i}"></div>
        ${m.photo?`<div class="pphoto"><img src="${m.photo}" alt=""><div class="plabel">📍 מקמו את הקוד כאן</div></div>`:''}
      </div>
      <div class="priddle">${m.riddle||''}</div>`;
    area.appendChild(d);
  });
  MISSIONS.forEach((m,i)=>makeQR(`pqr-${i}`,m.code,170));
  setTimeout(()=>{window.print();},400);
}

  <div class="card"><div class="muted" id="rPreview"></div></div>
  <div class="card">
     <h2 style="font-size:18px">📊 לוח תוצאות חי (Google Sheets)</h2>
     <p class="muted">חברו את המשחק לגיליון Google כדי לראות בזמן אמת את התוצאה של כל קבוצה בכל תחנה. הדביקו כאן את כתובת ה-Web App (לפי קובץ ההוראות).</p>
     <input type="text" class="ipt" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${getSheetUrl()}">
     <button class="btn small" id="saveSheet">💾 שמור קישור</button>
     <button class="btn ghost" id="shareLink">🔗 צור קישור לכיתה (כולל החיבור)</button>
     <button class="btn" id="openBoard">📊 פתח לוח תוצאות חי</button>
     <div class="muted" id="shareOut" style="margin-top:8px;word-break:break-all"></div>
  </div>`;
  document.getElementById('saveSheet').onclick=()=>{ setSheetUrl(document.getElementById('sheetUrl').value.trim()); toast('הקישור נשמר ✓'); };
  document.getElementById('shareLink').onclick=()=>{
    const u=document.getElementById('sheetUrl').value.trim(); if(!u){toast('הדביקו קישור קודם',true);return;}
    setSheetUrl(u);
    const link=location.origin+location.pathname+'?sheet='+encodeURIComponent(u);
    document.getElementById('shareOut').innerHTML='שתפו לכיתה את הקישור הזה (כל מי שייכנס דרכו יתחבר ללוח):<br><b style="color:var(--gold)">'+link+'</b>';
    if(navigator.clipboard){navigator.clipboard.writeText(link).then(()=>toast('הקישור הועתק ✓')).catch(()=>{});}
  };
  document.getElementById('openBoard').onclick=()=>{ setSheetUrl(document.getElementById('sheetUrl').value.trim()); boardFrom='admin'; S.screen='board'; render(); };
  const upd=()=>{
    RACE.on=document.getElementById('rOn').checked;
    RACE.graceSec=parseInt(document.getElementById('rGrace').value)||0;
    RACE.decayPerMin=parseInt(document.getElementById('rDecay').value)||0;
    RACE.floorPct=parseInt(document.getElementById('rFloor').value)||0;
    saveRace(); preview();
  };
  const preview=()=>{
    const P=100000;
    const rows=[1,2,4,6,10].map(min=>`תוך ${min} דק׳ → <b style="color:var(--gold)">${fmt(computeAward(P,min*60))}</b>`);
    document.getElementById('rPreview').innerHTML='דוגמה לתחנה ששווה '+fmt(P)+':<br>'+rows.join(' &nbsp;·&nbsp; ');
  };
  ['rOn','rGrace','rDecay','rFloor'].forEach(id=>{ const el=document.getElementById(id); el.oninput=upd; el.onchange=upd; });
  preview();
}

function adminMap(){
  const body=document.getElementById('adminBody');
  body.innerHTML=`<div class="card"><p class="muted">🗺️ גררו כל סמן (לפי מספר התחנה) למיקום האמיתי שלו בפארק. כך הקבוצות יראו לאן להגיע. השינויים נשמרים אוטומטית.</p></div>
    <div class="admin-map-wrap" id="amap"><img src="${MAP_IMG}" alt="מפה"><div id="apins"></div></div>
    <div class="card"><div class="muted" id="pinLegend"></div></div>
    <button class="btn ghost" id="resetPins">♻️ איפוס מיקומי הסמנים לברירת מחדל</button>`;
  const wrap=document.getElementById('amap');
  const layer=document.getElementById('apins');
  document.getElementById('pinLegend').innerHTML=MISSIONS.map((m,i)=>`<b style="color:var(--gold)">${i+1}</b> ${m.name}`).join(' &nbsp;·&nbsp; ');
  let cur=null;
  function draw(){
    layer.innerHTML=MISSIONS.map((m,i)=>`<div class="dragpin" data-i="${i}" style="left:${m.mapX}%;top:${m.mapY}%">${i+1}</div>`).join('');
    layer.querySelectorAll('.dragpin').forEach(p=>p.addEventListener('pointerdown',startDrag));
  }
  function startDrag(e){
    cur=+e.currentTarget.dataset.i; e.preventDefault();
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
    document.addEventListener('pointermove',moveDrag);
    document.addEventListener('pointerup',endDrag);
  }
  function moveDrag(e){
    if(cur===null)return;
    const r=wrap.getBoundingClientRect();
    let x=(e.clientX-r.left)/r.width*100, y=(e.clientY-r.top)/r.height*100;
    x=Math.max(0,Math.min(100,x)); y=Math.max(0,Math.min(100,y));
    MISSIONS[cur].mapX=Math.round(x*10)/10; MISSIONS[cur].mapY=Math.round(y*10)/10;
    const pin=layer.querySelector(`.dragpin[data-i="${cur}"]`); if(pin){pin.style.left=x+'%';pin.style.top=y+'%';}
  }
  function endDrag(){
    if(cur!==null) saveCfg();
    cur=null;
    document.removeEventListener('pointermove',moveDrag);
    document.removeEventListener('pointerup',endDrag);
  }
  draw();
  document.getElementById('resetPins').onclick=()=>{
    MISSIONS.forEach((m,i)=>{ if(DEFAULT_MISSIONS[i]){m.mapX=DEFAULT_MISSIONS[i].mapX;m.mapY=DEFAULT_MISSIONS[i].mapY;} });
    saveCfg(); draw();
  };
}

function hashPw(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}return h;}
const ADMIN_HASH=242841693;
document.getElementById('adminLink').onclick=()=>{
  if(S.screen==="admin"){ return; }
  const pw=prompt("🔒 אזור מורה — הזינו סיסמה:");
  if(pw===null) return;
  if(hashPw(pw)===ADMIN_HASH){ S.screen="admin"; render(); }
  else { toast("סיסמה שגויה",true); }
};

/* boot */
setInterval(updateClock,1000);
render();
</script>
